{% extends 'traffic_app/base.html' %}
{% load static %}

{% block content %}
<div class="fullscreen-bg" style="background-image: url('{% static 'images/traffic-bg.jpg' %}');">
    <div class="hero-section">
        <div class="auth-card">
            <h2>Login</h2>
            <form method="post" class="auth-form">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" name="username" id="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" required>
                </div>
                <button type="submit" class="auth-btn">Login</button>
            </form>
            <p class="auth-link">Don't have an account? <a href="{% url 'register' %}"><b>Sign up here</b></a></p>
            <p class="back"><a href="{% url 'index' %}">←Back</a></p>
        </div>
    </div>
</div>
{% endblock %}
