{% extends 'traffic_app/base.html' %}
{% load static %}

{% block content %}
<div class="fullscreen-bg" style="background-image: url('{% static 'images/traffic-bg.jpg' %}');">
    <div class="hero-section">
        <div class="auth-card">
            <h2><i class="fas fa-user-plus"></i> Create Account</h2>
            <form method="post" class="auth-form">
                {% csrf_token %}
                {% for field in form %}
                    <div class="form-group">
                        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <small class="error-text">{{ field.errors|striptags }}</small>
                        {% endif %}
                    </div>
                {% endfor %}
                <button type="submit" class="auth-btn">Register</button>
            </form>
            <p class="auth-link">Already have an account? <a href="{% url 'login' %}">Login here</a></p>
            <p class="back"><a href="{% url 'index' %}">←Back</a></p>
        </div>
    </div>
</div>
{% endblock %}
